<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F766E">
<title>{{ page.title }} — QuemFaz</title>
<meta name="description" content="{{ page.description | default: 'Documento legal do QuemFaz.' }}">
<link rel="icon" type="image/svg+xml" href="/assets/img/app-icon.svg">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/docs.css">

<!--
  Analytics — keep in sync with index.html.
  Activate the same provider on both files so legal-doc reads also count.
  -->
<!--
<script defer src="https://static.cloudflareinsights.com/beacon.min.js"
        data-cf-beacon='{"token": "YOUR_BEACON_TOKEN"}'></script>
-->
</head>
<body>

<header class="qf-docs-header">
  <div class="qf-docs-header__inner">
    <a href="/" class="qf-logo" aria-label="Voltar para a página inicial">
      <svg class="qf-logo__mark" width="28" height="28" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="lgmarkdoc" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0F766E"></stop>
            <stop offset="1" stop-color="#115E59"></stop>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="14" fill="url(#lgmarkdoc)"></rect>
        <circle cx="28" cy="28" r="14" fill="none" stroke="#FFFFFF" stroke-width="4"></circle>
        <path d="M38 38 L48 48" stroke="#FBBF24" stroke-width="4.5" stroke-linecap="round"></path>
        <circle cx="28" cy="28" r="2.5" fill="#FBBF24"></circle>
      </svg>
      <span class="qf-logo__text">Quem<em>Faz</em></span>
    </a>
    <a href="/" class="qf-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
      Voltar pra home
    </a>
  </div>
</header>

<main class="qf-docs">
  <div class="qf-docs__eyebrow">{{ page.eyebrow | default: 'Documento' }}</div>
  <h1>{{ page.title }}</h1>
  {% if page.lede %}<p class="qf-docs__lede">{{ page.lede }}</p>{% endif %}
  {% if page.updated %}<span class="qf-docs__updated">Atualizado em {{ page.updated }}</span>{% endif %}

  {{ content }}
</main>

<footer class="qf-docs-footer">
  <div class="qf-docs-footer__inner">
    <span>© 2026 QuemFaz</span>
    <div class="qf-docs-footer__links">
      <a href="/privacidade.html">Privacidade</a>
      <a href="/termos.html">Termos</a>
      <a href="/diretrizes.html">Diretrizes</a>
      <a href="/excluir-conta.html">Excluir conta</a>
      <a href="mailto:contato@quemfaz.com.br">contato@quemfaz.com.br</a>
    </div>
  </div>
</footer>

</body>
</html>
